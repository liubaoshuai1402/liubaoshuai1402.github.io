<!doctype html><html lang=zh-cn><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>| BOGHTW</title><link rel=icon href=/images/favicon.png><link rel=stylesheet href=/css/style.css><link rel=stylesheet href=/css/fonts.css></head><body><nav><ul class=menu><li><a href=/>主页</a></li><li><a href=/series/>专栏</a></li><li><a href=/categories/>分类</a></li><li><a href=/tags/>标签</a></li><li><a href=/archives/>归档</a></li><li><a href=/search/>搜索</a></li><li><a href=/about/>关于</a></li></ul><hr></nav><p style="margin:1.8rem 0 -1rem;color:#191919">可以根据标题、分类、标签、系列等条目检索本站文章</p><div class=search-container><input type=text id=search-input placeholder=输入关键词搜索... aria-label=搜索框 autocomplete=off><div id=search-debug style=margin-bottom:10px;color:#999></div><div id=search-results></div></div><script src=https://cdn.jsdelivr.net/npm/fuse.js@6.6.2></script><script>function debug(e){document.getElementById("search-debug").textContent=e}let searchIndex=[];debug("索引初始化中..."),searchIndex.push({title:'"Pytorch中的张量操作"',permalink:'"/%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0/%E5%BC%A0%E9%87%8F%E6%93%8D%E4%BD%9C/"',content:`"Pytorch中的张量操作 数学符号 1. * 运算符 如果张量的形状完全一样，张量 * 张量，其实就是对应元素相乘，也可以$\\\\odot$表示。\\n如果张量的形状不一样，则要求他们的形状只能在一个维度上不一样，且其中一个张量这个维度的size为1，这样可以用广播机制补全后相乘。\\n如果张量 * 数字，则是全体元素乘以这个数字。\\n函数、方法 1. permute() 可以作为张量对象的方法使用，接受置换后的维度。\\nimport torch table = torch.randn(2,3,4) print(table) print(table.permute(2,1,0)) 这段代码就是将第一维和第三维进行置换。\\n由已知的张量还有置换后的顺序，怎么写出新的张量呢，这个问题一直让我困扰。\\n今天的学习，我脑子里突然蹦出一个邻居的概念。对于一个四维的张量元素，它应该有四个不同维度的邻居，但如果仅仅把视角局限在矩阵里，那它就只有两个邻居，一个行维度上的，一个列维度上的，这很不对。得把视野打开，通道维度和批次维度的邻居可能隔了很远，但它们也是邻居。\\n2. reshape()和view() 深度学习中，经常会把高维张量降维，计算后再展开，要小心翼翼，错位会带来灾难性的错误。\\n对于一个（N，F，M）的张量，F是其特征维度。如果想把N和M合并，应该先把F变成最高维度或者最低维度，让需要合并的维度接壤。\\nimport torch table = torch.randn(2,3,4) print(table) a = table.reshape(3,8) b = table.permute(1,0,2).reshape(3,8) print(a) print(b) 这里先把张量形状变成了（3，2，4），再合并，可以保证张量维度不会错位，如果直接改写性质为（3，8），则会错位。\\nreshape()和view()是一样的，前者可以作用于numpy数组。\\n3. flatten() 将高维张量展平为一维张量。\\n4. torch.cat() 把张量按给定的顺序和维度进行拼接，除了拼接维度外，张量必须具有相同的形状。\\n可用于特征维度的拓展，加入新的特征。\\n5. unsqueeze() torch.unsqueeze torch.unsqueeze(input, dim) → Tensor\\n为张量插入一个新的size为1的维度。用于升维。配合expand()食用更佳。\\n6. expand() torch.Tensor.expand 这个只有张量方法，没有函数。\\nTensor.expand(*sizes) → Tensor\\n将张量沿着某个size为1的维度进行复制拓展。\\ntotal_nbr_fea = torch.cat( [atom_in_fea.unsqueeze(1).expand(N, M, self.atom_fea_len), atom_nbr_fea, nbr_fea], dim=2) atom_in_fea张量的形状本是(N,self.atom_fea_len)，通过unsqueeze(1)，变成(N,1,self.atom_fea_len)。\\n再通过expand(N, M, self.atom_fea_len),变成(N, M, self.atom_fea_len)形状。\\n7. chunk() torch.chunk torch.chunk(input: Tensor , chunks: int , dim: int = 0) → Tuple[Tensor, \\u0026hellip;]\\n尝试把张量分成指定数量的块。也就是分割张量。可指定维度分割。但，数量可能会比指定的少，一般最好成倍数时使用。\\n可用于分割特征维度。\\n8. torch.sum() torch.sum torch.sum(input, dim, keepdim=False, ***, dtype=None) → Tensor\\n将张量元素沿指定维度进行加和。\\n切片 1. 简单切片 import torch a = torch.tensor(range(12)).view(3,4) b = a[1,2] print(a) print(b) 在张量切片中，逗号表示维度间隔。在这个简单切片中，整数代表索引。\\n也可以接受start:stop:step格式的索引进行切片，一个简单:代表全选这一维度。\\nimport torch a = torch.tensor(range(24)).view(2,3,4) b = a[1,:] print(a) print(b) 这里是一个三维张量，但是只用了一个逗号，这是一种简写，其实是逗号后续的所有维度都全选。\\n2. 高级切片 张量的某个维度的索引也可以是张量。\\n如果索引是一维张量，据测试，其实是列表也行。就是多个整数索引组成的列表或者一维张量。根据这些整数确定这个维度怎么被取。\\nimport torch import numpy as np atom_in_fea = torch.randn(4,5,6) nbr_fea_idx = torch.tensor([0, 1, 4]) atom_nbr_fea1 = atom_in_fea[:,nbr_fea_idx,:] atom_nbr_fea2 = atom_in_fea[:,[0,1,4],:] print(atom_nbr_fea1==atom_nbr_fea2) 这里dim=1维度的切片索引就是一个一维张量，里面的整数是0，1，4。说明切片时，取这个维度的第1，第2，第5个数据。\\n如果索引是二维张量，在切片的同时其实进行了升维。\\nimport torch import numpy as np atom_in_fea = torch.randn(4,5,6) #shape(2,2) nbr_fea_idx = torch.tensor([[0, 1],[1,2]]) atom_nbr_fea = atom_in_fea[:,nbr_fea_idx,:] print(atom_nbr_fea.shape) #torch.Size([4, 2, 2, 6]) 这里dim=1维度的切片索引就是一个二维张量，它会按照内部每一行的整数对这个维度进行切片，并根据内部的行数形成新的一维。\\n听起来很复杂，这里给出一个具体的应用场景，在CGCNN的卷积操作中。\\natom_in_fea的性质为（N，features），N是批次内的总原子数\\nnbr_fea_idx是一个二维张量（N，M），记录了N个原子的邻居原子的原子id。\\natom_nbr_fea = atom_in_fea[nbr_fea_idx, :] 从形状上来看，这样的切片结果就是把（N，features）中的N替换成（N，M），最终变成（N，M，features）\\n这样，就得到了，每个原子的M个邻居原子的原子特征。\\n这里nbr_fea_idx的记录很关键，CIFData给出的是每个晶体内的，collate_pool函数会把它更新成batch内的。模型接受的参数是经collate_pool函数集成后的。\\n"`,categories:'["深度学习"]',tags:[],series:[],date:'"2025-05-20"'}),searchIndex.push({title:'"用于搭建神经网络的函数"',permalink:'"/%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0/pytorch2/"',content:`"用于搭建神经网络的函数 前言 此处记录常见的神经网络函数，排名不分先后。\\n全连接层 1. nn.Linear() 对输入数据施加一个仿射线性变换，一般使用指定两个参数，是输入矩阵和输出矩阵的最高维的size。（因为最高维一般是特征维度，这个函数就是用来控制特征维度size大小的）\\n这里是CGCNN的图卷积操作公式，这里的W（权重），b（偏置）其实全连接层决定的。看到这样的写法就要明白其实是经历了一个全连接层。\\ntotal_gated_fea = self.fc_full(total_nbr_fea) total_gated_fea = self.bn1(total_gated_fea.view( -1, self.atom_fea_len*2)).view(N, M, self.atom_fea_len*2) nbr_filter, nbr_core = total_gated_fea.chunk(2, dim=2) nbr_filter = self.sigmoid(nbr_filter) nbr_core = self.softplus1(nbr_core) 对应代码就是进过全连接层后，（再进行批标准化，chunk分割，这些公式里没有体现），然后施加$\\\\sigma$函数和激活函数（g）。\\n激活函数 1. nn.ReLU() 这个激活函数不用指定输入输出特征的维度，它只是把所有特征变为非负，对于正值保留原始值，对于负值则转化为0。\\n2. nn.Softmax() 对一个n维的张量施加Softmax()函数，使得其沿某个维度的元素值的和为1。所以接受一个dim参数来指定维度。 $$ \\\\mathrm{Softmax}(x_i)=\\\\frac{\\\\mathrm{exp}(x_i)}{\\\\sum_{j}\\\\mathrm{exp}(x_j)} $$ 这里简单插入一下Pytorch中有关dim的实践。\\n比如说一个张量的size是(4,2,3)，那么他的dim=0指的是4，dim=1指的是2，dim=2指的是3。\\n比如说对于这个张量，我有个和Pytorch相反的习惯，我习惯先看每行有多少个元素，是3。我就误以为它的dim=0对应的是3。\\n其实不然，深度学习中，dim最大值对应维度的size，往往对应样本的特征数。\\n一个简单的二维的深度学习的输入张量的size一般是这样的：(batch_size,features)。\\ntensor([[[0.3299, 0.4336, 0.2365], [0.0695, 0.0668, 0.8638]], [[0.8114, 0.1116, 0.0770], [0.3142, 0.1086, 0.5772]], [[0.3178, 0.4508, 0.2315], [0.1620, 0.2610, 0.5770]], [[0.4454, 0.4082, 0.1464], [0.2974, 0.5297, 0.1729]]]) 3. nn.LogSoftmax() 对一个n维的张量施加log(Softmax())函数，通常用于获取对数概率，并与损失函数nn.NLLLoss()一起使用\\n4. nn.Softmax2d() 针对3维(C,H,W)或4维(N,C,H,W)的输入，它总是沿着C对应的维度对张量施加Softmax()函数\\n5. nn.Softplus() 对每个张量元素施加 Softplus 函数。这是一个ReLU函数的光滑近似，用于保证正的输出。\\n默认$\\\\beta$值为1，当输入值*$\\\\beta$大于一定门槛（默认值20）时，会变成线性。\\n$\\\\mathrm{Softplus}(x)=\\\\frac{1}{\\\\beta}\\\\log(1+\\\\exp(\\\\betax))$\\n6. nn.Sigmoid() 对张量的每个元素施加Sigmoid函数。对于小于0的输入，输出0-0.5；对于大于0的输入，输出0.5-1。整体是非负的。\\n$\\\\mathrm{Sigmoid}(x)=\\\\sigma(x)=\\\\frac{1}{1+\\\\exp(-x)}$\\n批标准化 1. nn.BatchNorm1d() 对二维(N,C)或三维(N,C,L)的输入进行批标准化。\\n对于二维输入，其实N是batch大小，C是特征数，这里叫Channels，是沿着列求平均和方差的。并且这个函数求的是有偏方差。\\n对于三维输入，可以理解成先转化为(N*L,C)，再用二维的处理方法得到结果，再展开。\\n池化 正则化 1. nn.Dropout() 在每次前向传播时，以一定概率让张量中的某些元素归零。防止过拟合。常用于分类任务。不要用于回归任务。\\n接受一个浮点数，用于表示概率，默认值是0.5。\\n"`,categories:'["深度学习"]',tags:[],series:[],date:'"2025-05-19"'}),searchIndex.push({title:'"Python中的文件操作"',permalink:'"/%E4%BB%A3%E7%A0%81/fileoperations/"',content:`"Python中的文件操作 1.获取当前路径 os.getcwd()可以返回当前工作目录的绝对路径。cwd可以理解成current work directory。\\n"`,categories:'["代码"]',tags:[],series:[],date:'"2025-05-18"'}),searchIndex.push({title:'"花朵分类"',permalink:'"/%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0/pytorch1/"',content:`"花朵分类 前言 本文主要借助torchvision软件包，简单梳理一下深度学习代码的基本框架。\\n数据集加载 #假设当前工作路径下，存放着一个名为'flower_data'的文件夹，里面存放着训练集和验证集的图片 #用os.path.join()来一级级得获取路径 data_dir = os.path.join(os.getcwd(),'flower_data') train_dir = os.path.join(data_dir, 'train') valid_dir = os.path.join(data_dir, 'valid') # Define batch size batch_size = 32 # Define transforms for the training and validation sets normalize = transforms.Normalize(mean=[0.485, 0.456, 0.406], std=[0.229, 0.224, 0.225]) #定义对数据预处理的组合，比如旋转图片、改变尺寸等等，让模型有更强的稳定性 train_data_transforms = transforms.Compose([ transforms.RandomResizedCrop(size=256, scale=(0.8, 1.0)), transforms.RandomRotation(degrees=15), transforms.ColorJitter(), transforms.RandomHorizontalFlip(), transforms.CenterCrop(size=224), transforms.ToTensor(), normalize, ]) validate_data_transforms = transforms.Compose([ transforms.Resize(256), transforms.CenterCrop(224), transforms.ToTensor(), normalize, ]) #这里才真正的把图片加载成了二维数据。 train_dataset = datasets.ImageFolder( train_dir, train_data_transforms) validate_dataset = datasets.ImageFolder( valid_dir, validate_data_transforms) #做了那么多铺垫，其实就是为了把可用于训练的数据(二维数据)放到 DataLoader 里面 train_loader = torch.utils.data.DataLoader( train_dataset, batch_size=batch_size, shuffle=True, num_workers=4) validate_loader = torch.utils.data.DataLoader( validate_dataset, batch_size=batch_size, shuffle=True, num_workers=4) data_loader = {} data_loader['train'] = train_loader data_loader['valid'] = validate_loader batch_size，当训练数据很多时，一次性加载全部数据进行训练会是一种挑战。这时就需要用到批次训练。batch_size即是一次训练中使用的数据量。注意这里的一次训练，不是指一epoch。只有遍历所有训练集后，才能叫做完成了一代训练。一代训练包含了诸多这样的一次训练。\\nshuffle参数为True时，随机采样。\\n这是CGCNN（晶体卷积图神经网络）的代码中，用于得到训练集、验证集、测试集的DateLoader。\\ndef get_train_val_test_loader(dataset, collate_fn=default_collate, batch_size=64, train_ratio=None, val_ratio=0.1, test_ratio=0.1, return_test=False, num_workers=1, pin_memory=False, **kwargs): total_size = len(dataset) if kwargs['train_size'] is None: if train_ratio is None: assert val_ratio + test_ratio \\u0026lt; 1 train_ratio = 1 - val_ratio - test_ratio print(f'[Warning] train_ratio is None, using 1 - val_ratio - ' f'test_ratio = {train_ratio} as training data.') else: assert train_ratio + val_ratio + test_ratio \\u0026lt;= 1 indices = list(range(total_size)) if kwargs['train_size']: train_size = kwargs['train_size'] else: train_size = int(train_ratio * total_size) if kwargs['test_size']: test_size = kwargs['test_size'] else: test_size = int(test_ratio * total_size) if kwargs['val_size']: valid_size = kwargs['val_size'] else: valid_size = int(val_ratio * total_size) train_sampler = SubsetRandomSampler(indices[:train_size]) val_sampler = SubsetRandomSampler( indices[-(valid_size + test_size):-test_size]) if return_test: test_sampler = SubsetRandomSampler(indices[-test_size:]) train_loader = DataLoader(dataset, batch_size=batch_size, sampler=train_sampler, num_workers=num_workers, collate_fn=collate_fn, pin_memory=pin_memory) val_loader = DataLoader(dataset, batch_size=batch_size, sampler=val_sampler, num_workers=num_workers, collate_fn=collate_fn, pin_memory=pin_memory) if return_test: test_loader = DataLoader(dataset, batch_size=batch_size, sampler=test_sampler, num_workers=num_workers, collate_fn=collate_fn, pin_memory=pin_memory) if return_test: return train_loader, val_loader, test_loader else: return train_loader, val_loader 这段代码整体分为两部分，其一是根据参数确定训练集、验证集、测试集的数量，其二是装配DataLoader。和花朵分类的代码稍有不同，这样的实现可以让用户自由决定训练集、验证集和测试集。多使用了DataLoader的sampler参数。\\nSubsetRandomSampler是torch.utils.data.sampler模块中的六个类之一。用于随机采样。\\n这里是常规用法，假设有100个数据，80个用于训练集，15个用于验证集，5个用于测试集。\\n那么，\\n训练集的SubsetRandomSampler的初始化参数就是list(range(100))[0:80]。\\n验证集的SubsetRandomSampler的初始化参数就是list(range(100))[-20:-5]。\\n测试集的SubsetRandomSampler的初始化参数就是list(range(100))[-5:]。\\n1. Dataset与DataLoader 在CGCNN中，作者自己手写了CIFData作为自定义的Dataset。\\nCIFData三个重要的魔法方法的功能：\\n1.__init__()方法\\ndef __init__(self, root_dir, max_num_nbr=12, radius=8, dmin=0, step=0.2, random_seed=123): 这里简单初始化了：数据集的路径、晶体的解析细节（比如最大邻居数和截断半径，高斯距离的参数）\\n2.__len__()方法\\n让CIFData的实例可以通过len()函数返回数据集大小。\\n3.__getitem__()方法\\n这里先用了@functools.lru_cache(maxsize=None)修饰器来缓存数据，避免每次读入相同结构时，都要解析晶体。\\nDataLoader中的collate_fn打包函数\\nCGCNN代码中自定义了打包函数，名叫collate_pool()\\nDataLoader实例在初始化同样只是规定了一些加载参数，并没有实际加载数据集。\\n只有当遍历DataLoader实例时，才开始加载、打包、返回数据。(for循环抽打DataLoader，DataLoader抽打Dataset)\\n但是遍历DataLoader并不会得到一个个的数据点，而是得到一个个batch的数据包，这是由collate_fn打包函数完成的，每当经历了batch_size个数据点，打包函数就会把他们合并。\\n这里是打包函数返回的内容\\nreturn (torch.cat(batch_atom_fea, dim=0), torch.cat(batch_nbr_fea, dim=0), torch.cat(batch_nbr_fea_idx, dim=0), crystal_atom_idx),\\\\ torch.stack(batch_target, dim=0),\\\\ batch_cif_ids 以及for循环的例子， for i, (input, target, _) in enumerate(train_loader):\\n得到的input其实是第一个返回，即一个元组，包含了经过拼接后的同一批次内的原子特征、邻居特征、以及邻居特征索引和全局原子索引。\\n写神经网络 model_input = 'resnet152' # Build and train network if model_input == 'vgg16': # Build and train network model = models.vgg16(pretrained=True) elif model_input == 'vgg19': # Build and train network model = models.vgg19(pretrained=True) elif model_input == 'resnet152': model = models.resnet152(pretrained=True) # Freeze training for all layers for param in model.parameters(): param.requires_grad = False # # Newly created modules have require_grad=True by default if 'vgg' in model_input: num_features = model.classifier[-1].in_features model.classifier[6] = nn.Sequential( nn.Linear(num_features, 512), nn.ReLU(), nn.Linear(512, len(cat_to_name)), nn.LogSoftmax(dim=1)) elif 'resnet' in model_input: num_features = model.fc.in_features model.fc = nn.Sequential( nn.Linear(num_features, 512), nn.ReLU(), nn.BatchNorm1d(512), nn.Dropout(0.4), nn.Linear(512, len(cat_to_name)), nn.LogSoftmax(dim=1)) print(model.__class__.__name__) # check to see that your last layer produces the expected number of outputs # print(model.classifier[-1].out_features) 根据参数选择预训练模型并冻结模型参数，然后修改输出层。\\n对于vgg模型，\\nself.classifier = nn.Sequential( nn.Linear(512 * 7 * 7, 4096), nn.ReLU(True), nn.Dropout(p=dropout), nn.Linear(4096, 4096), nn.ReLU(True), nn.Dropout(p=dropout), nn.Linear(4096, num_classes), ) 他的分类器本来包含了7层，但是作者觉得最后一层的4096个特征太多了，就改写了一下，减少特征为512个。\\ntrain()函数 让我们看看一个合格的训练函数都应该做哪些工作。\\ndef train(train_loader, model, criterion, optimizer, epoch, normalizer): #每一代epoch都调用一次train函数 batch_time = AverageMeter() data_time = AverageMeter() losses = AverageMeter() if args.task == 'regression': mae_errors = AverageMeter() else: accuracies = AverageMeter() precisions = AverageMeter() recalls = AverageMeter() fscores = AverageMeter() auc_scores = AverageMeter() # switch to train mode model.train() end = time.time() #一个训练函数应该要遍历整个训练集 for i, (input, target, _) in enumerate(train_loader): #遍历train_loader，其实是一个个的批次 # measure data loading time data_time.update(time.time() - end) if args.cuda: input_var = (Variable(input[0].cuda(non_blocking=True)), Variable(input[1].cuda(non_blocking=True)), input[2].cuda(non_blocking=True), [crys_idx.cuda(non_blocking=True) for crys_idx in input[3]]) else: input_var = (Variable(input[0]), Variable(input[1]), input[2], input[3]) # normalize target if args.task == 'regression': target_normed = normalizer.norm(target) else: target_normed = target.view(-1).long() if args.cuda: target_var = Variable(target_normed.cuda(non_blocking=True)) else: target_var = Variable(target_normed) # compute output #把这一批次的数据带入模型 output = model(*input_var) #由模型得到的结果和目标值得到损失函数 loss = criterion(output, target_var) # measure accuracy and record loss if args.task == 'regression': mae_error = mae(normalizer.denorm(output.data.cpu()), target) losses.update(loss.data.cpu(), target.size(0)) mae_errors.update(mae_error, target.size(0)) else: accuracy, precision, recall, fscore, auc_score = \\\\ class_eval(output.data.cpu(), target) losses.update(loss.data.cpu().item(), target.size(0)) accuracies.update(accuracy, target.size(0)) precisions.update(precision, target.size(0)) recalls.update(recall, target.size(0)) fscores.update(fscore, target.size(0)) auc_scores.update(auc_score, target.size(0)) # compute gradient and do SGD step optimizer.zero_grad() loss.backward() #后向传播、计算梯度 optimizer.step() #传递梯度、调整参数 # measure elapsed time batch_time.update(time.time() - end) end = time.time() if i % args.print_freq == 0: if args.task == 'regression': print('Epoch: [{0}][{1}/{2}]\\\\t' 'Time {batch_time.val:.3f} ({batch_time.avg:.3f})\\\\t' 'Data {data_time.val:.3f} ({data_time.avg:.3f})\\\\t' 'Loss {loss.val:.4f} ({loss.avg:.4f})\\\\t' 'MAE {mae_errors.val:.3f} ({mae_errors.avg:.3f})'.format( epoch, i, len(train_loader), batch_time=batch_time, data_time=data_time, loss=losses, mae_errors=mae_errors) ) else: print('Epoch: [{0}][{1}/{2}]\\\\t' 'Time {batch_time.val:.3f} ({batch_time.avg:.3f})\\\\t' 'Data {data_time.val:.3f} ({data_time.avg:.3f})\\\\t' 'Loss {loss.val:.4f} ({loss.avg:.4f})\\\\t' 'Accu {accu.val:.3f} ({accu.avg:.3f})\\\\t' 'Precision {prec.val:.3f} ({prec.avg:.3f})\\\\t' 'Recall {recall.val:.3f} ({recall.avg:.3f})\\\\t' 'F1 {f1.val:.3f} ({f1.avg:.3f})\\\\t' 'AUC {auc.val:.3f} ({auc.avg:.3f})'.format( epoch, i, len(train_loader), batch_time=batch_time, data_time=data_time, loss=losses, accu=accuracies, prec=precisions, recall=recalls, f1=fscores, auc=auc_scores) ) def train(train_loader, model, criterion, optimizer, epoch, normalizer): 这里接受的参数有：训练集的DataLoader、模型、损失函数、优化器、epoch、正则化。\\nmodel.train()\\n首先，把模型的训练模式打开，这样网格中一些特殊的函数比如Dropout才会被开启。\\nfor循环遍历训练集的DataLoader\\n把得到的批数据，经过简单的处理，比如把张量上传到CUDA。\\n把批数据流入模型，再后向传播。\\n"`,categories:'["深度学习"]',tags:[],series:[],date:'"2025-05-18"'}),searchIndex.push({title:'"使用rNEMD方法计算热导率的lammps输入文件"',permalink:'"/%E5%88%86%E5%AD%90%E5%8A%A8%E5%8A%9B%E5%AD%A6/thermal_conductivity_rnemd/"',content:'"使用rNEMD方法计算热导率的LAMMPS输入文件 前言 rNEMD方法 ，又叫MP方法，计算材料热导率。\\nLAMMPS官方提供了计算脚本，但是使用的单位却是lj单位制，非常不实用，这里是我自己写的metal单位制下的脚本。\\n注意：本文仅供参考，欢迎指出错误或分享补充。无能力提供任何指导，求教者切勿留言。\\nin file # sample LAMMPS input script for thermal conductivity of liquid LJ # Muller-Plathe method via fix thermal_conductivity # settings temperature, kB and timestep variable t equal 1500 variable k equal 8.6173e-5 variable dt equal 0.0005 # convert from LAMMPS metal units to SI variable eV2J equal 1.6022e-19 #energy convert variable A2m equal 1.0e-10 #distance convert variable ps2s equal 1.0e-12 #time convert variable convert equal ${eV2J}/${ps2s}/${A2m} # setup problem units metal atom_style atomic atom_modify map yes newton on read_data ./333 pair_style mace no_domain_decomposition pair_coeff * * /home-ssd/Users/nsgm_lbs/train/MACE_model/MACE_model_run-123_stagetwo.model-lammps.pt O Zr Y H neighbor 1.0 bin neigh_modify every 500 delay 0 check no minimize 1e-5 1e-7 1000 1000 timestep ${dt} velocity all create $t 87287 # 1st equilibration run reset_timestep 0 fix 1 all npt temp $t $t 0.05 iso 0 0 0.5 thermo_style custom step temp pe etotal enthalpy lx ly lz vol press thermo 100 run 5000 unfix 1 velocity all scale $t fix 1 all nvt temp $t $t 0.05 run 5000 unfix 1 # 2nd equilibration run compute ke all ke/atom variable temp atom c_ke/1.5/${k} fix 1 all nve compute layers all chunk/atom bin/1d z lower 0.05 units reduced fix 2 all ave/chunk 10 100 1000 layers v_temp file profile.mp fix 3 all thermal/conductivity 100 z 20 variable tdiff equal f_2[11][3]-f_2[1][3] thermo_style custom step temp epair etotal f_3 v_tdiff thermo_modify colname f_3 E_delta colname v_tdiff dTemp_step thermo 1000 run 20000 # thermal conductivity calculation # reset fix thermal/conductivity to zero energy accumulation fix 3 all thermal/conductivity 100 z 20 variable start_time equal time variable kappa equal (f_3/(time-${start_time})/(lx*ly)/2.0)*(lz/2.0)/f_ave fix ave all ave/time 1 1 1000 v_tdiff ave running thermo_style custom step temp epair etotal f_3 v_tdiff f_ave thermo_modify colname f_3 E_delta colname v_tdiff dTemp_step colname f_ave dTemp run 20000 print \\u0026quot;Running average thermal conductivity units metal: $(v_kappa)\\u0026quot; variable tc equal ${kappa}*${convert} print \\u0026quot;Running average thermal conductivity units SI: $(v_tc:%.2f)\\u0026quot; "',categories:'["分子动力学"]',tags:[],series:'["LAMMPS"]',date:'"2025-05-16"'}),searchIndex.push({title:'"如何构建训练集用于训练机器学习势"',permalink:'"/%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E5%8A%BF/mace1/"',content:`"如何构建训练集用于训练机器学习势 前言 本文将介绍如何构建一个训练集，用于训练MACE势以及DP势。需要提前利用AIMD获取DFT数据集。这里的AIMD软件是VASP。\\n软件：ASE、DeepMD-Kit\\n注意：本文仅供参考，欢迎指出错误或分享补充。无能力提供任何指导，求教者切勿留言。\\n构建MACE势的训练集 MACE接受的训练集非常简单，一个xyz文件，包含了各种构型和它们对应的DFT数据标签，以及单原子的DFT数据，需要额外的标签config_type=IsolatedAtom。\\n顺带一提，ASE可以输出一种所谓的 Extended XYZ format ，会把各种各样的信息（有点类似OVITO中的全局信息），放到xyz文件的第二行。这一行会很长很长。MACE所采用的训练集输入格式就是它。\\n假设我们要构建水分子的MACE势，当前所处的路径下，有两个文件夹。\\n一个名为H2O的文件夹，里面存放着进行第一性原理分子动力学后得到的OUTCAR.tar.gz文件。路径为H2O/OUTCAR.tar.gz。\\n一个名为IsolatedAtoms的文件夹，里面存放着涉及元素（这里是H、O）的单原子的单点能计算（ISPIN=2）。路径分别为IsolatedAtoms/H/OUTCAR.tar.gz和IsolatedAtoms/O/OUTCAR.tar.gz。\\n代码展示 from ase.io import read,write #定义一个简单的函数用于打标签,这里可以自由更改标签的名字 def addlabel(configs,energy_label='energy_dft',forces_label='forces_dft',stress_label='stress_dft',is_isolated=False): if is_isolated == False: for at in configs: at.info[energy_label] = at.get_potential_energy(force_consistent=True) at.arrays[forces_label] = at.get_forces() at.info[stress_label] = at.get_stress(voigt=True) if is_isolated == True: for at in configs: at.info['config_type'] = 'IsolatedAtom' at.info[energy_label] = at.get_potential_energy(force_consistent=True) at.arrays[forces_label] = at.get_forces() at.info[stress_label] = at.get_stress(voigt=True) #read()函数，这里，第一个参数是所读文件路径，第二个参数是切片slice IsolatedH = read('IsolatedAtoms/H/OUTCAR.tar.gz',':') IsolatedO = read('IsolatedAtoms/O/OUTCAR.tar.gz',':') IsolatedAtoms = IsolatedH + IsolatedO addlabel(configs=IsolatedAtoms,is_isolated=True) #这里的slice的意思是从第一个结构开始到最后一个结构，每100个结构取一个 db = read('H2O/OUTCAR.tar.gz','::100') addlabel(configs=db) #将打过标签的数据集合并 db = db + IsolatedAtoms write('trainset.xyz',db) 这里有趣的一点是，为什么对于单个结构的OUTCAR，也要进行切片：IsolatedH = read('IsolatedAtoms/H/OUTCAR.tar.gz',':')，而不是IsolatedH = read('IsolatedAtoms/H/OUTCAR.tar.gz')。\\n这是因为read()函数读取只有一个原子的结构是，会返回atom类的实例，而非atoms类的实例。而atom类不支持info属性，会很麻烦。\\n即便是多原子的单结构，如果想把他们合并成一个轨迹，也一定要用切片的形式\\u0026quot;:\\u0026quot;读取，因为两个atoms类的实例加和会得到一个新的atoms类的实例。\\nfrom ase.io import read,write #假设H2O.cif是一个含有一个水分子的胞 #这样只会输出一个含有两个水分子的胞 db1 = read('H2O.cif') db2 = read('H2O.cif') db = db1 + db2 write('H2O.xyz',db) #使用切片后，read会返回list[atoms],再进行加和得到的是list[atoms1,atoms2],用write()函数写的时候，就能依次形成轨迹了 db1 = read('H2O.cif',':') db2 = read('H2O.cif',':') db = db1 + db2 write('H2O.xyz',db) 所以，如果我们想让单一结构也加入到我们的数据集时，也要记得用切片的形式进行读取。不过要铭记于心的是，用切片的形式读取的其实是一个list[atoms]，要使用其中atoms实例的方法时，记得用for循环遍历其中的atoms实例。\\n"`,categories:'["机器学习势"]',tags:[],series:'["ASE","DeepMD-Kit"]',date:'"2025-05-16"'}),searchIndex.push({title:'"机器学习势MACE的输入文件"',permalink:'"/%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E5%8A%BF/mace2/"',content:`"机器学习势MACE的输入文件 前言 不同MACE版本的参数设置会有一定的调查，注意查看自己的MACE版本。\\n注意：本文仅供参考，欢迎指出错误或分享补充。无能力提供任何指导，求教者切勿留言。\\n"`,categories:'["机器学习势"]',tags:[],series:'["MACE"]',date:'"2025-05-16"'}),searchIndex.push({title:'"均方位移（MSD）-OVITO"',permalink:'"/%E5%88%86%E5%AD%90%E5%8A%A8%E5%8A%9B%E5%AD%A6/msd_ovito/"',content:`"均方位移（MSD）计算 by OVITO 前言 OVITO Python Reference — OVITO Python Reference 3.12.3 documentation 是一个开源且功能强大的分子动力学后处理软件包。\\n本文将介绍如何利用 OVITO python module 计算某类元素原子在一段轨迹内的均方位移。\\n适用于无机非晶体，其他体系慎用。\\n软件：OVITO、matplotlib、numpy\\n注意：本文仅供参考，欢迎指出错误或分享补充。无能力提供任何指导，求教者切勿留言。\\nOVITO版 代码展示 from ovito.io import import_file, export_file from ovito.modifiers import CalculateDisplacementsModifier from ovito.modifiers import SelectTypeModifier,InvertSelectionModifier,DeleteSelectedModifier,ExpressionSelectionModifier import numpy as np import matplotlib.pyplot as plt #万物起源 import_file ，导入一段要计算的轨迹 pipeline = import_file(\\u0026quot;1.dump\\u0026quot;) #添加 SelectTypeModifier 修饰器 #设置参数 property = 'Particle Type' 指定选择的类型（这里我们指定的是原子类型） #设置参数 types = {4} 指定具体的原子类型，这里是这个轨迹中的 4 原子（这个值要根据自己的体系修改），这里用数字代表原子是因为我使用的lammps的输出风格没有记录原子的元素符号，如果你的轨迹里记录的是 元素符号 信息，比如说 VASP 输出的 XDATCAR，则需要用类似于 types = {\\u0026quot;H\\u0026quot;} 的写法 pipeline.modifiers.append(SelectTypeModifier(property = 'Particle Type', types = {4})) #添加 InvertSelectionModifier 修饰器，进行原子反选，为剔除不需要计算的原子做准备 pipeline.modifiers.append(InvertSelectionModifier()) #添加 DeleteSelectedModifier 修饰器，删除上一行代码反选的原子，留下需要计算的原子 pipeline.modifiers.append(DeleteSelectedModifier(operate_on= {'particles'})) #添加 CalculateDisplacementsModifier 修饰器，指定计算 MSD 的参考结构，这里 reference_frame = 0 代表初始结构是参考结构 reference_frame = 0 pipeline.modifiers.append(CalculateDisplacementsModifier(reference_frame=0)) #a subclass of ovito.pipeline.ReferenceConfigurationModifier #自定义一个修饰器函数，用于将 per-particle displacement 转化为相应元素的均方位移 #本文的 OVITO小知识 将简单介绍自定义修饰器是如何工作的 def calculate_msd(frame, data): #用一个变量 displacement_magnitudes 记录 data.particles['Displacement Magnitude']，简化代码 displacement_magnitudes = data.particles['Displacement Magnitude'] #计算 MSD （将所有原子位移的平方加和然后求平均），OVITO 的数据可以直接和 numpy 交互，nice msd = np.sum(displacement_magnitudes ** 2) / len(displacement_magnitudes) #把计算的 MSD 传递给 data (DataCollection类) data.attributes[\\u0026quot;MSD\\u0026quot;] = msd #添加自定义 calculate_msd 修饰器 pipeline.modifiers.append(calculate_msd) #计算 Pipeline, 得到time vs MSD的数据 table = [] #用于存放数据，time vs MSD for frame,data in enumerate(pipeline.frames): if frame \\u0026gt;= reference_frame: #这里的 *10 一定要根据自己的计算调整，我的轨迹在lammps计算设置：时间步是0.5fs，每20步输出一帧，所以轨迹中每帧其实经历了10fs，所以乘以10 #我们 time vs MSD 的x横坐标单位是fs，也可以是别的，自己调整 time = (frame-reference_frame)*10 table.append([time,data.attributes['MSD']]) #.csv文件还是比较高级的，比纯txt好些，delimiter 指定间隔符为 \\u0026quot;,\\u0026quot; ,这样方便直接excel打开 np.savetxt(\\u0026quot;msd_data.csv\\u0026quot;,table,delimiter=\\u0026quot;,\\u0026quot;) OVITO小知识 受限于Python基础和时间精力的限制，以下内容皆为我个人的有限理解，未能严格考究，仅供参考。\\n自定义修饰器 这里介绍的自定义修饰器，按官方说法是 Simple programming interface，它是一个函数，接受两个基本输入：frame 和 data。\\n即，def modify(frame: int, data: DataCollection):\\n注意：不要返回任何值，数据都应保存在 data 这个 DataCollection 类中\\ndef calculate_msd(frame, data): displacement_magnitudes = data.particles['Displacement Magnitude'] msd = np.sum(displacement_magnitudes ** 2) / len(displacement_magnitudes) data.attributes[\\u0026quot;MSD\\u0026quot;] = msd DataCollection 类的 attributes 属性储存了这个实例数据集的所有的global attributes（全局信息）。\\nattributes 属性是由经过@propert装饰器装饰的方法，这个方法返回一个辅助类，也可以叫功能类（_AttributesView）的实例，_AttributesView是抽象基类MutableMapping的子类。\\n_AttributesView类用于实现类似字典的功能。\\n每次访问attributes 属性时，都会返回一个_AttributesView类的实例，这个实例会先通过__init__接收DataCollection实例的数据，并支持对其进行字典操作。\\n所以，当我们data.attributes[\\u0026quot;MSD\\u0026quot;] = msd时，是通过_AttributesView类提供的字典操作，把MSD数据添加到了DataCollection实例中。\\n由于_AttributesView类实现了__repr__方法，我们可以直接print(data.attributes)来查看包含了哪些全局信息。\\nfor frame,data in enumerate(pipeline.frames):语句 DataCollection要pipeline经过compute()方法得到，但这个例子中并没有见到compute()方法。其实隐藏在了这句for循环中。\\npipeline.frames会返回一个迭代器，这个迭代器中yield产生每一帧的DataCollection。\\nReferences 1. OVITO官方的MSD脚本 "`,categories:'["分子动力学"]',tags:[],series:'["OVITO"]',date:'"2025-05-13"'}),searchIndex.push({title:'"稍微深入一些Python中的类（class）"',permalink:'"/%E4%BB%A3%E7%A0%81/class_in_python/"',content:`"稍微深入一些Python中的类（class） 前言 **类（class）**在python代码中几乎无处不在，但在近日的学习中发现，我对它真是了解甚少，甚至基础结构都不能熟稔于心，故开此笔记认真学习。和我一起重新认识一下它吧。\\n一个简单的类 #code 1 class Dog: # 类属性 species = \\u0026quot;Dog\\u0026quot; # 初始化方法 def __init__(self, name, age): self.name = name self.age = age # 实例方法 def bark(self): return print(\\u0026quot;旺旺\\u0026quot;) print(mydog.species) print(mydog.name,mydog.age) mydog.bark() #输出为： #Dog #doudou 2 #旺旺 类是一种对数据进行计算操作的蓝图，离不开属性和方法。\\ncode 1中，我们定义了一个 Dog 类，并对它进行了实例化，生成了一个对象。\\n这个类的结构，很简单。\\n首先是放在第一部分的类属性。类属性是直接在类中定义变量。所有通过这个类生成的对象都具有这些属性。\\n然后是放在第二部分的诸多方法，其实就是一个个的函数。\\ndef __init__(self, name, age): self.name = name self.age = age _init_方法叫初始化方法，是魔法方法的一种。让实例初始化时就具有name和age属性和相应的值。具体表现为mydog = Dog(\\u0026quot;doudou\\u0026quot;,2)，这个类在初始化时就需要两个参数才能转变为实例。\\npython中所有的实例方法，包括__init__方法，第一个参数都必须是self，用于区别普通函数和方法。\\n默认值，在定义方法的时候，可以传入默认值，这可以保证在不传入参数时，也能生成一个默认实例。\\ndef __init__(self, name=\\u0026quot;小卡拉米\\u0026quot;, age=5): self.name = name self.age = age 这样的__init__方法就保证了，即使狗主人忘记了填写信息，mydog = Dog()也能正常工作，但默认的狗狗是小卡拉米，还是应该记得为自己的狗狗正确填写信息呦。（对于其他实例方法也适用）\\n在一般的实例方法中，也可以设置参数，定义属性。我们看一段新的代码:\\n#code 2-1 class phone: owner = \\u0026quot;xiyangyang\\u0026quot; def __init__(self,type=\\u0026quot;huawei\\u0026quot;): self.type = type def call(self,number=10086): self.number = number print(\\u0026quot;the number is {}\\u0026quot;.format(self.number)) print(phone.owner) myphone = phone(\\u0026quot;apple\\u0026quot;) myphone.call(110) print(\\u0026quot;what number is called? \\u0026quot;,myphone.number) 这里在phone类的call方法下，定义了一个实例属性，并需要一个输入number指定值。\\n但实例方法的参数不一定都是实例属性，且看以下代码：\\n#code 2-2 class phone: def __init__(self,type=\\u0026quot;huawei\\u0026quot;): self.type = type def call(self,number=10086): print(\\u0026quot;the number is {}\\u0026quot;.format(number)) myphone = phone(\\u0026quot;apple\\u0026quot;) myphone.call(110) 这样定义call方法，在使用的时候也需要传入一个number，但是这个number不是这个实例的属性，无法随时查看。\\n这就是说，对于类中的方法，目前涉及的参数有三类，一个是默认参数self，一个是实例属性参数，一个是普通参数。\\n截至目前，我们已经了解了一个简单类的结构。即：声明类属性，声明实例方法（其中涉及到添加实例属性）。 由类生成实例时的参数接口，由魔法方法__init__定义，而一般实例方法的接口，在调用方法的时候才会出现。这也就意味着，__init__方法中定义的实例属性，是伴生的，只要生成实例就存在。而随一般实例方法定义的实例属性，则需要首次调用后才存在。 魔法方法 在python中，所有被双下划线包围的方法，统称为魔法方法。太多了，我这里只记录我遇到的，不定时更新。\\n1.__init__方法 这个魔法方法用于类的初始化。规定了实例化类时接受的参数。\\n2.__len__方法 #code 3-1 class menu: restaurant=\\u0026quot;hepingfandian\\u0026quot; def __init__(self,foods): self.foods = foods def __len__(self): count = 0 for food in foods: count = count + 1 return count mymenu = menu([\\u0026quot;宫保鸡丁\\u0026quot;,\\u0026quot;鱼香肉丝\\u0026quot;,\\u0026quot;米饭\\u0026quot;]) print(len(mymenu)) #输出：3 这个魔法方法让实例可以被用len()函数统计长度，核心是要返回一个整数，至于这个整数是如何计算得到的，这部分内容就由自己定义了。\\n3.__getitem__方法 #code 3-2 class menu: restaurant=\\u0026quot;hepingfandian\\u0026quot; def __init__(self,foods): self.foods = foods def __getitem__(self,key): return 10 mymenu = menu([\\u0026quot;宫保鸡丁\\u0026quot;,\\u0026quot;鱼香肉丝\\u0026quot;,\\u0026quot;米饭\\u0026quot;]) print(mymenu[\\u0026quot;霸王餐\\u0026quot;]) #输出：10 这个魔法方法可以让实例像字典或列表一样，实现键值对和索引切片的功能。具体来说，就是根据条件返回不同的值。不然就像上述代码一样，客人要吃霸王餐，对应的值却是10。\\n#code 3-3 class menu: restaurant=\\u0026quot;hepingfandian\\u0026quot; def __init__(self,foods): self.foods = foods def __getitem__(self,key): if not isinstance(key,str): raise TypeError(\\u0026quot;Attribute key must be a string\\u0026quot;) if key == \\u0026quot;霸王餐\\u0026quot;: return \\u0026quot;你吃牛魔\\u0026quot; for food in self.foods: if food == key: return self.foods[key] raise KeyError(f\\u0026quot;Food '{key}' does not exist in menu.\\u0026quot;) mymenu = menu({\\u0026quot;宫保鸡丁\\u0026quot;:25,\\u0026quot;鱼香肉丝\\u0026quot;:10,\\u0026quot;米饭\\u0026quot;:2}) print(mymenu[\\u0026quot;霸王餐\\u0026quot;]) print(mymenu[\\u0026quot;米饭\\u0026quot;]) #输出：你吃牛魔 #输出：2 __getitem__方法可以为实例提供独特的接口，就是[参数]。这里的参数可以是字符串、数字或者切片，使用起来像字典或者列表。而一般方法的使用则要.onemethod(参数1，参数2，...)。\\n#code 3-4 class top3: ip = \\u0026quot;harbin\\u0026quot; def __init__(self,school): self.school = school def __getitem__(self,index): if isinstance(index,int): return self.school[index] if isinstance(index,slice): return self.school[index] Top3InMyheart = top3([\\u0026quot;qinghua\\u0026quot;,\\u0026quot;beida\\u0026quot;,\\u0026quot;hagongda\\u0026quot;]) print(\\u0026quot;who is top3?\\u0026quot;,Top3InMyheart[0:3]) print(Top3InMyheart.ip) 这段代码定义了一个名叫top3类，实现了索引和切片功能，同时可以这个类的实例拥有列表不同的功能，即这个类的实例有一个类属性：ip。让我们可以得知这个排名来自harbin。\\n4.__setitem__方法 #code 3-5 class games: def __init__(self): self.games={} def __setitem__(self,key,value): self.games[key]=value def __getitem__(self,key): return self.games[key] MyLoveGames = games() MyLoveGames[1] = \\u0026quot;原神\\u0026quot; print(MyLoveGames[1]) #输出：原神 这个魔法方法让类的实例可以像字典或者列表一样，添加新的键值对或者添加新的索引和值。\\n5.__delitem__方法 #code 3-6 class games: def __init__(self): self.games={} def __setitem__(self,key,value): self.games[key]=value def __getitem__(self,key): return self.games[key] def __delitem__(self,key): del self.games[key] MyLoveGames = games() MyLoveGames[1] = \\u0026quot;原神\\u0026quot; MyLoveGames[1] = \\u0026quot;DOTA2\\u0026quot; print(MyLoveGames[1]) del MyLoveGames[1] #输出：DOTA2 这个魔法方法可以让类的实例使用del关键字来删除键或索引。\\n6.__iter__方法 #code 3-7 class games: def __init__(self): self.games={} def __setitem__(self,key,value): self.games[key]=value def __getitem__(self,key): return self.games[key] def __delitem__(self,key): del self.games[key] def __iter__(self): for game in self.games: yield game MyLoveGame = games() MyLoveGame[0] = \\u0026quot;原神\\u0026quot; MyLoveGame[3] = \\u0026quot;DOTA2\\u0026quot; MyLoveGame[2] = \\u0026quot;明日方舟\\u0026quot; del MyLoveGame[2] for game in MyLoveGame: print(game) #输出：0 #输出：3 这个魔法方法让实例变为可迭代对象，可以进行for循环。也可以用iter()函数生成迭代器。这里涉及到一个头疼的yield关键字，又涉及到生成器和迭代器。还是另开一文来记录吧。\\n简单来讲，当一个可迭代对象遇到for循环事件时，会自动转到它的__iter__方法，又因为这里的__iter__方法含有yield关键字，所以不会立即执行，而是得到了一个生成器对象。\\n紧接着，for循环又根据这个生成器对象的__next__方法（注意，这里是生成器对象的__next__方法，而非是，我们这个自定义类的__next__方法，其实，我们这里也没有写__next__方法）把得到的值赋值给for game in MyLoveGame:中的game，然后打印。\\n在进行第二次循环的时候，同样地，再次进入实例的__iter__方法，得到同一个生成器对象。并对这个生成器对象再此施加__next__方法，并把得到的值赋值给for game in MyLoveGame:中的game，然后打印。\\n谁是for game in MyLoveGame:中的game值？ __iter__方法本质上定义了一个生成器对象，而非函数。for循环会不断调用这个生成器对象__next__方法并把得到的值传递给game。\\n7.__repr__方法 #code 3-8 import collections.abc class games(collections.abc.MutableMapping): def __init__(self): self.games={} def __len__(self): return 0 def __setitem__(self,key,value): self.games[key]=value def __getitem__(self,key): return self.games[key] def __delitem__(self,key): del self.games[key] def __iter__(self): for game in self.games: yield game def __repr__(self): return repr(dict(self)) MyLoveGame = games() MyLoveGame[0] = \\u0026quot;原神\\u0026quot; MyLoveGame[1] = \\u0026quot;DOTA2\\u0026quot; MyLoveGame[2] = \\u0026quot;明日方舟\\u0026quot; print(MyLoveGame) #输出：{0: '原神', 1: 'DOTA2', 2: '明日方舟'} 这里让自定义的games继承了一个抽象基类，这样return repr(dict(self))才不报错。\\n这个魔法方法让实例可以直接使用实例时，返回一个官方字符串。\\n继承与抽象基类 如何继承父类 #code 4-1 class student: def __init__(self,gender=1,age=18): self.gender = gender self.age = age class xiaoxiaobuaigugujiao(student): def interests(self,data): self.interests = data print(self.interests) me = xiaoxiaobuaigugujiao() print(me.gender) print(me.age) me.interests(\\u0026quot;games\\u0026quot;) 在定义子类的时候，在子类的名字后加上(父类名)即可。\\nsuper()函数 #code 4-2 class student: def __init__(self,gender=1,age=18): self.gender = gender self.age = age class xiaoxiaobuaigugujiao(student): #子类中，当覆盖父类中的同名方法后，与父类同名方法的默认参数也要重新写一篇，不会继承 def __init__(self,gender=1,age=18,height=170): #调用父类的构造方法 super().__init__(gender,age) #额外补充 self.height = height def interests(self,data): self.interests = data print(self.interests) me = xiaoxiaobuaigugujiao() print(me.gender) print(me.age) print(me.height) me.interests(\\u0026quot;games\\u0026quot;) super()函数通常出现在子类定义方法的时候，用于调用父类的构造方法，并可以加以补充，这里我们在子类初始化时，就调用了父类student的构造方法，并额外补充了height。\\n抽象基类 抽象基类只能被继承。它要求子类必须实现某些抽象方法。\\n"`,categories:'["代码"]',tags:[],series:'["python"]',date:'"2025-05-13"'}),searchIndex.push({title:'"径向分布函数（RDF）-OVITO"',permalink:'"/%E5%88%86%E5%AD%90%E5%8A%A8%E5%8A%9B%E5%AD%A6/rdf_ovito/"',content:`"径向分布函数（RDF）计算 by OVITO 前言 OVITO Python Reference — OVITO Python Reference 3.12.3 documentation 是一个开源且功能强大的分子动力学后处理软件包。\\n本文将介绍如何利用 OVITO python module 计算单个结构以及一段轨迹（多个结构）内的径向分布函数。\\n适用于无机非晶体，其他体系慎用。\\n软件：OVITO、matplotlib、numpy\\n注意：本文仅供参考，欢迎指出错误或分享补充。无能力提供任何指导，求教者切勿留言。\\nThe partial RDFs of a single crystal structure 代码展示 #这段代码用于计算 RDF by OVITO from ovito.io import import_file from ovito.modifiers import CoordinationAnalysisModifier import numpy as np #导入一个氧化锆（ZrO2）的cif文件，所有OVITO支持的输入文件格式都可以（确保这个.py文件的路径下有这样一个cif文件，也可以稍微修改指定结构路径） pipeline = import_file(\\u0026quot;ZrO.cif\\u0026quot;) #施加一个名叫 CoordinationAnalysisModifier 的修饰器，cutoff用于控制截断半径，number_of_bins用于控制网格细分度（大小100-1000内都可以试试） pipeline.modifiers.append(CoordinationAnalysisModifier(cutoff = 5.0, number_of_bins = 500,partial=True)) #进行计算 rdf_table = pipeline.compute().tables['coordination-rdf'] #得到用于画图的横纵坐标，默认第一列是x轴数据，其余列是y轴数据 total_rdf = rdf_table.xy() #记录total_rdf中y轴数据对应是什么类型的pair-wise #这个例子中，输出为： #g(r) for pair-wise type combination O-O: #g(r) for pair-wise type combination O-Zr: #g(r) for pair-wise type combination Zr-Zr: #说明total_rdf是一个四列的数据，第一列是x轴坐标（其实是bin），第二列就是不同pair-wise的RDF数据，依次为 O-O,O-Zr,Zr-Zr rdf_names = rdf_table.y.component_names for component, name in enumerate(rdf_names): print(\\u0026quot;g(r) for pair-wise type combination %s:\\u0026quot; % name) #将total_rdf保存为txt文件，用于后续画图 np.savetxt(\\u0026quot;total_rdf.txt\\u0026quot;, total_rdf) #这段代码用于绘图 import numpy as np import matplotlib.pyplot as plt rdf_table = np.loadtxt('total_rdf.txt') #g(r) for pair-wise type combination O-O: #g(r) for pair-wise type combination O-Zr: #g(r) for pair-wise type combination Zr-Zr: #这里取的是 total_rdf.txt 中的第一列（对应[:,0]）和第三列（对应[:,2]），所以绘制的是 Zr-O pair-wise的partial RDF plt.plot(rdf_table[:,0], rdf_table[:,2]) #matplotlib的常规设置，问问万能的小迪老师吧 title_font = {'fontsize': 24, 'fontfamily': 'Times New Roman'} xlabel_font = {'fontsize': 22, 'fontfamily': 'Times New Roman'} ylabel_font = {'fontsize': 22, 'fontfamily': 'Times New Roman'} plt.title(\\u0026quot;RDF Zr-O\\u0026quot;, fontdict=title_font,pad=8) plt.xlabel(xlabel='distance r',fontdict=xlabel_font,loc='center',labelpad=8) plt.ylabel(ylabel='g(r)',fontdict=ylabel_font,loc='center',labelpad=8) plt.tick_params(axis='both', which='major', labelsize=16, direction='in') ax = plt.subplot() #因为只有一个静态结构，pair-wise的某些峰很高，所以这里的y轴坐标上限设置大一些，为200，可灵活改变 #x轴设置为6，稍大于截断半径cutoff即可，因为本身也只在截断半径以内统计 ax.set_ylim(0,200) plt.xlim(0,6) fig = plt.gcf() fig.set_size_inches(1200/100, 800/100) plt.savefig('output.png', dpi=100) plt.show() 结果展示 The partial RDFs of trajectories 代码展示 #这段代码用于计算一定时间内（一段轨迹）的平均 RDFs from ovito.io import import_file from ovito.modifiers import CoordinationAnalysisModifier,TimeAveragingModifier import numpy as np #读入轨迹文件，这里是利用 VASP 进行 AIMD 后得到的 XDATCAR 文件 pipeline = import_file(\\u0026quot;XDATCAR\\u0026quot;) #打印轨迹中的结构数 print(\\u0026quot;Number of MD frames:\\u0026quot;, pipeline.num_frames) #添加修饰器，与单个晶体结构相比，多了 TimeAveragingModifier 修饰器 pipeline.modifiers.append(CoordinationAnalysisModifier(cutoff = 5.0, number_of_bins = 500,partial=True)) pipeline.modifiers.append(TimeAveragingModifier(operate_on='table:coordination-rdf')) #计算 RDFs 数据 total_rdf = pipeline.compute().tables['coordination-rdf[average]'].xy() #记录pair-wise类型 rdf_names = pipeline.compute().tables['coordination-rdf[average]'].y.component_names for name in rdf_names: print(\\u0026quot;g(r) for pair-wise type combination %s:\\u0026quot; % name) #输出数据，用于后续绘图，不再重复 np.savetxt('rdf.txt', total_rdf, delimiter='\\\\t') OVITO小知识 受限于Python基础和时间精力的限制，以下内容皆为我个人的有限理解，未能严格考究，仅供参考。\\n在 The partial RDFs of a single crystal structure 的计算代码中 pipeline = import_file(\\u0026quot;ZrO.cif\\u0026quot;) 这段代码将外来的 cif 文件转化为 ovito 的一个 Pipeline 类的实例。\\n然后我们添加了修饰器，代码省略。\\n再然后是调用 Pipeline 类的 compute() 方法，得到一个非常重要的 DataCollection 类的实例。\\n再访问这个 DataCollection 实例的 tables 属性就得到一个DataTable 类的实例（在DataCollection 类的定义中，用 @property 的 装饰器语法将 tables() 方法转化为了 tables 属性，所以与 compute() 方法相比，不需要 () 了）\\nDataTable 类用于储存绘制直方和2d图的数据，当我们添加 CoordinationAnalysisModifier 修饰器后，经过 compute() 方法后，相应的 partial RDFs 数据就会被储存在这里，可以通过名为 'coordination-rdf' 的 键(key) 来检索。\\n我觉得 DataTable 类的实例绝非一个简单的字典，但把它当作字典来理解会比较容易。\\nrdf_table = pipeline.compute().tables['coordination-rdf'] 即，rdf_table 仍然属于 DataTable 类。接着用 .y.component_names 来获取 多组y轴数据 的表头。这里太复杂了，我也没看太懂，不展开了。\\nrdf_names = rdf_table.y.component_names 在 The partial RDFs of trajectories 的计算代码中 原本 compute() 方法只能用于单个结构，对于 trajectories 需要指定是哪个结构。\\n但添加 TimeAveragingModifier 修饰器后，允许我们计算时间相关量的平均值。详见：https://docs.ovito.org/python/modules/ovito_modifiers.html#ovito.modifiers.TimeAveragingModifier\\nReferences ovito.modifiers — OVITO Python Reference 3.12.3 documentation "`,categories:'["分子动力学"]',tags:[],series:'["OVITO"]',date:'"2025-05-12"'}),debug("当前本站共有 "+searchIndex.length+" 篇文章"),console.log("搜索索引:",searchIndex);const options={includeScore:!0,threshold:.6,keys:[{name:"title",weight:.7},{name:"content",weight:.3},{name:"tags",weight:.5},{name:"categories",weight:.5},{name:"series",weight:.5}]},fuse=new Fuse(searchIndex,options);document.addEventListener("keydown",function(e){if(e.key==="Escape"){document.getElementById("search-input").value="";for(var t=document.getElementById("search-results");t.firstChild;)t.removeChild(t.firstChild);debug("当前本站共有 "+searchIndex.length+" 篇文章"),document.getElementById("search-input").focus()}}),document.getElementById("search-input").addEventListener("input",function(e){const n=e.target.value.trim(),s=document.getElementById("search-results");if(s.innerHTML="",n===""){debug("当前本站共有 "+searchIndex.length+" 篇文章");return}debug("搜索词: '"+n+"'");const t=fuse.search(n);if(debug("找到 "+t.length+" 条结果"),console.log("搜索结果:",t),t.length===0){s.innerHTML="<p>没有找到相关文章</p>";return}t.forEach(e=>{const o=e.item,t=document.createElement("div");t.className="search-result-item";const i=document.createElement("span");i.textContent=o.date.replace(/^"|"$/g,"")+"   ",i.className="search-result-date";const n=document.createElement("a");n.href=o.permalink.replace(/^"|"$/g,""),n.textContent=o.title.replace(/^"|"$/g,""),n.className="search-result-title",t.appendChild(i),t.appendChild(n),s.appendChild(t)})})</script><style>.search-co
