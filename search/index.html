<link rel=icon href=/images/favicon.png><link rel=stylesheet href=/css/style.css><link rel=stylesheet href=/css/fonts.css></head><body><nav><ul class=menu><li><a href=/>主页</a></li><li><a href=/series/>专栏</a></li><li><a href=/categories/>分类</a></li><li><a href=/tags/>标签</a></li><li><a href=/archives/>归档</a></li><li><a href=/search/>搜索</a></li><li><a href=/about/>关于</a></li></ul><hr></nav><p style="margin:1.8rem 0 -1rem;color:#191919">可以根据标题、分类、标签、系列等条目检索本站文章</p><div class=search-container><input type=text id=search-input placeholder=输入关键词搜索... aria-label=搜索框 autocomplete=off><div id=search-debug style=margin-bottom:10px;color:#999></div><div id=search-results></div></div><script src=https://cdn.jsdelivr.net/npm/fuse.js@6.6.2></script><script>function debug(e){document.getElementById("search-debug").textContent=e}let searchIndex=[];debug("索引初始化中..."),searchIndex.push({title:'"均方位移（MSD）-OVITO"',permalink:'"/%E5%88%86%E5%AD%90%E5%8A%A8%E5%8A%9B%E5%AD%A6/msd_ovito/"',content:`"均方位移（MSD）计算 by OVITO 前言 OVITO Python Reference — OVITO Python Reference 3.12.3 documentation 是一个开源且功能强大的分子动力学后处理软件包。\\n本文将介绍如何利用 OVITO python module 计算某类元素原子在一段轨迹内的均方位移。\\n适用于无机非晶体，其他体系慎用。\\n软件：OVITO、matplotlib、numpy\\n注意：本文仅供学习交流，欢迎指出错误或分享补充。无能力提供任何指导，求教者切勿留言。\\nOVITO版 代码展示 from ovito.io import import_file, export_file from ovito.modifiers import CalculateDisplacementsModifier from ovito.modifiers import SelectTypeModifier,InvertSelectionModifier,DeleteSelectedModifier,ExpressionSelectionModifier import numpy as np import matplotlib.pyplot as plt #万物起源 import_file ，导入一段要计算的轨迹 pipeline = import_file(\\u0026quot;1.dump\\u0026quot;) #添加 SelectTypeModifier 修饰器 #设置参数 property = 'Particle Type' 指定选择的类型（这里我们指定的是原子类型） #设置参数 types = {4} 指定具体的原子类型，这里是这个轨迹中的 4 原子（这个值要根据自己的体系修改），这里用数字代表原子是因为我使用的lammps的输出风格没有记录原子的元素符号，如果你的轨迹里记录的是 元素符号 信息，比如说 VASP 输出的 XDATCAR，则需要用类似于 types = {\\u0026quot;H\\u0026quot;} 的写法 pipeline.modifiers.append(SelectTypeModifier(property = 'Particle Type', types = {4})) #添加 InvertSelectionModifier 修饰器，进行原子反选，为剔除不需要计算的原子做准备 pipeline.modifiers.append(InvertSelectionModifier()) #添加 DeleteSelectedModifier 修饰器，删除上一行代码反选的原子，留下需要计算的原子 pipeline.modifiers.append(DeleteSelectedModifier(operate_on= {'particles'})) #添加 CalculateDisplacementsModifier 修饰器，指定计算 MSD 的参考结构，这里 reference_frame = 0 代表初始结构是参考结构 reference_frame = 0 pipeline.modifiers.append(CalculateDisplacementsModifier(reference_frame=0)) #a subclass of ovito.pipeline.ReferenceConfigurationModifier #自定义一个修饰器函数，用于将 per-particle displacement 转化为相应元素的均方位移 #本文的 OVITO小知识 将简单介绍自定义修饰器是如何工作的 def calculate_msd(frame, data): #用一个变量 displacement_magnitudes 记录 data.particles['Displacement Magnitude']，简化代码 displacement_magnitudes = data.particles['Displacement Magnitude'] #计算 MSD （将所有原子位移的平方加和然后求平均），OVITO 的数据可以直接和 numpy 交互，nice msd = np.sum(displacement_magnitudes ** 2) / len(displacement_magnitudes) #把计算的 MSD 传递给 data (DataCollection类) data.attributes[\\u0026quot;MSD\\u0026quot;] = msd #添加自定义 calculate_msd 修饰器 pipeline.modifiers.append(calculate_msd) #计算 Pipeline, 得到time vs MSD的数据 table = [] #用于存放数据，time vs MSD for frame,data in enumerate(pipeline.frames): if frame \\u0026gt;= reference_frame: #这里的 *10 一定要根据自己的计算调整，我的轨迹在lammps计算设置：时间步是0.5fs，每20步输出一帧，所以轨迹中每帧其实经历了10fs，所以乘以10 #我们 time vs MSD 的x横坐标单位是fs，也可以是别的，自己调整 time = (frame-reference_frame)*10 table.append([time,data.attributes['MSD']]) #.csv文件还是比较高级的，比纯txt好些，delimiter 指定间隔符为 \\u0026quot;,\\u0026quot; ,这样方便直接excel打开 np.savetxt(\\u0026quot;msd_data.csv\\u0026quot;,table,delimiter=\\u0026quot;,\\u0026quot;) OVITO小知识 受限于Python基础和时间精力的限制，以下内容皆为我个人的有限理解，未能严格考究，仅供参考。\\n自定义修饰器 这里介绍的自定义修饰器，按官方说法是 Simple programming interface，它是一个函数，接受两个基本输入：frame 和 data。\\n即，def modify(frame: int, data: DataCollection):\\n注意：不要返回任何值，数据都应保存在 data 这个 DataCollection 类中\\ndef calculate_msd(frame, data): displacement_magnitudes = data.particles['Displacement Magnitude'] msd = np.sum(displacement_magnitudes ** 2) / len(displacement_magnitudes) data.attributes[\\u0026quot;MSD\\u0026quot;] = msd DataCollection 类的 attributes 属性储存了这个实例数据集的所有的global attributes（全局信息）。\\nattributes 属性是由经过@propert装饰器装饰的方法，这个方法返回一个辅助类，也可以叫功能类（_AttributesView）的实例，_AttributesView是抽象基类MutableMapping的子类。\\n_AttributesView类用于实现类似字典的功能。\\n每次访问attributes 属性时，都会返回一个_AttributesView类的实例，这个实例会先通过__init__接收DataCollection实例的数据，并支持对其进行字典操作。\\n所以，当我们data.attributes[\\u0026quot;MSD\\u0026quot;] = msd时，是通过_AttributesView类提供的字典操作，把MSD数据添加到了DataCollection实例中。\\n由于_AttributesView类实现了__repr__方法，我们可以直接print(data.attributes)来查看包含了哪些全局信息。\\nfor frame,data in enumerate(pipeline.frames):语句 DataCollection要pipeline经过compute()方法得到，但这个例子中并没有见到compute()方法。其实隐藏在了这句for循环中。\\npipeline.frames会返回一个迭代器，这个迭代器中yield产生每一帧的DataCollection。\\nReferences https://www.ovito.org/manual/python/introduction/examples/modifiers/msd_calculation.html "`,categories:'["分子动力学"]',tags:[],series:'["OVITO"]',date:'"2025-05-13"'}),searchIndex.push({title:'"稍微深入一些Python中的类（class）"',permalink:'"/%E4%BB%A3%E7%A0%81/class_in_python/"',content:`"稍微深入一些Python中的类（class） 前言 **类（class）**在python代码中几乎无处不在，但在近日的学习中发现，我对它真是了解甚少，甚至基础结构都不能熟稔于心，故开此笔记认真学习。和我一起重新认识一下它吧。\\n一个简单的类 #code 1 class Dog: # 类属性 species = \\u0026quot;Dog\\u0026quot; # 初始化方法 def __init__(self, name, age): self.name = name self.age = age # 实例方法 def bark(self): return print(\\u0026quot;旺旺\\u0026quot;) print(mydog.species) print(mydog.name,mydog.age) mydog.bark() #输出为： #Dog #doudou 2 #旺旺 类是一种对数据进行计算操作的蓝图，离不开属性和方法。\\ncode 1中，我们定义了一个 Dog 类，并对它进行了实例化，生成了一个对象。\\n这个类的结构，很简单。\\n首先是放在第一部分的类属性。类属性是直接在类中定义变量。所有通过这个类生成的对象都具有这些属性。\\n然后是放在第二部分的诸多方法，其实就是一个个的函数。\\ndef __init__(self, name, age): self.name = name self.age = age _init_方法叫初始化方法，是魔法方法的一种。让实例初始化时就具有name和age属性和相应的值。具体表现为mydog = Dog(\\u0026quot;doudou\\u0026quot;,2)，这个类在初始化时就需要两个参数才能转变为实例。\\npython中所有的实例方法，包括__init__方法，第一个参数都必须是self，用于区别普通函数和方法。\\n默认值，在定义方法的时候，可以传入默认值，这可以保证在不传入参数时，也能生成一个默认实例。\\ndef __init__(self, name=\\u0026quot;小卡拉米\\u0026quot;, age=5): self.name = name self.age = age 这样的__init__方法就保证了，即使狗主人忘记了填写信息，mydog = Dog()也能正常工作，但默认的狗狗是小卡拉米，还是应该记得为自己的狗狗正确填写信息呦。（对于其他实例方法也适用）\\n在一般的实例方法中，也可以设置参数，定义属性。我们看一段新的代码:\\n#code 2-1 class phone: owner = \\u0026quot;xiyangyang\\u0026quot; def __init__(self,type=\\u0026quot;huawei\\u0026quot;): self.type = type def call(self,number=10086): self.number = number print(\\u0026quot;the number is {}\\u0026quot;.format(self.number)) print(phone.owner) myphone = phone(\\u0026quot;apple\\u0026quot;) myphone.call(110) print(\\u0026quot;what number is called? \\u0026quot;,myphone.number) 这里在phone类的call方法下，定义了一个实例属性，并需要一个输入number指定值。\\n但实例方法的参数不一定都是实例属性，且看以下代码：\\n#code 2-2 class phone: def __init__(self,type=\\u0026quot;huawei\\u0026quot;): self.type = type def call(self,number=10086): print(\\u0026quot;the number is {}\\u0026quot;.format(number)) myphone = phone(\\u0026quot;apple\\u0026quot;) myphone.call(110) 这样定义call方法，在使用的时候也需要传入一个number，但是这个number不是这个实例的属性，无法随时查看。\\n这就是说，对于类中的方法，目前涉及的参数有三类，一个是默认参数self，一个是实例属性参数，一个是普通参数。\\n截至目前，我们已经了解了一个简单类的结构。即：声明类属性，声明实例方法（其中涉及到添加实例属性）。 由类生成实例时的参数接口，由魔法方法__init__定义，而一般实例方法的接口，在调用方法的时候才会出现。这也就意味着，__init__方法中定义的实例属性，是伴生的，只要生成实例就存在。而随一般实例方法定义的实例属性，则需要首次调用后才存在。 魔法方法 在python中，所有被双下划线包围的方法，统称为魔法方法。太多了，我这里只记录我遇到的，不定时更新。\\n1.__init__方法 这个魔法方法用于类的初始化。规定了实例化类时接受的参数。\\n2.__len__方法 #code 3-1 class menu: restaurant=\\u0026quot;hepingfandian\\u0026quot; def __init__(self,foods): self.foods = foods def __len__(self): count = 0 for food in foods: count = count + 1 return count mymenu = menu([\\u0026quot;宫保鸡丁\\u0026quot;,\\u0026quot;鱼香肉丝\\u0026quot;,\\u0026quot;米饭\\u0026quot;]) print(len(mymenu)) #输出：3 这个魔法方法让实例可以被用len()函数统计长度，核心是要返回一个整数，至于这个整数是如何计算得到的，这部分内容就由自己定义了。\\n3.__getitem__方法 #code 3-2 class menu: restaurant=\\u0026quot;hepingfandian\\u0026quot; def __init__(self,foods): self.foods = foods def __getitem__(self,key): return 10 mymenu = menu([\\u0026quot;宫保鸡丁\\u0026quot;,\\u0026quot;鱼香肉丝\\u0026quot;,\\u0026quot;米饭\\u0026quot;]) print(mymenu[\\u0026quot;霸王餐\\u0026quot;]) #输出：10 这个魔法方法可以让实例像字典或列表一样，实现键值对和索引切片的功能。具体来说，就是根据条件返回不同的值。不然就像上述代码一样，客人要吃霸王餐，对应的值却是10。\\n#code 3-3 class menu: restaurant=\\u0026quot;hepingfandian\\u0026quot; def __init__(self,foods): self.foods = foods def __getitem__(self,key): if not isinstance(key,str): raise TypeError(\\u0026quot;Attribute key must be a string\\u0026quot;) if key == \\u0026quot;霸王餐\\u0026quot;: return \\u0026quot;你吃牛魔\\u0026quot; for food in self.foods: if food == key: return self.foods[key] raise KeyError(f\\u0026quot;Food '{key}' does not exist in menu.\\u0026quot;) mymenu = menu({\\u0026quot;宫保鸡丁\\u0026quot;:25,\\u0026quot;鱼香肉丝\\u0026quot;:10,\\u0026quot;米饭\\u0026quot;:2}) print(mymenu[\\u0026quot;霸王餐\\u0026quot;]) print(mymenu[\\u0026quot;米饭\\u0026quot;]) #输出：你吃牛魔 #输出：2 __getitem__方法可以为实例提供独特的接口，就是[参数]。这里的参数可以是字符串、数字或者切片，使用起来像字典或者列表。而一般方法的使用则要.onemethod(参数1，参数2，...)。\\n#code 3-4 class top3: ip = \\u0026quot;harbin\\u0026quot; def __init__(self,school): self.school = school def __getitem__(self,index): if isinstance(index,int): return self.school[index] if isinstance(index,slice): return self.school[index] Top3InMyheart = top3([\\u0026quot;qinghua\\u0026quot;,\\u0026quot;beida\\u0026quot;,\\u0026quot;hagongda\\u0026quot;]) print(\\u0026quot;who is top3?\\u0026quot;,Top3InMyheart[0:3]) print(Top3InMyheart.ip) 这段代码定义了一个名叫top3类，实现了索引和切片功能，同时可以这个类的实例拥有列表不同的功能，即这个类的实例有一个类属性：ip。让我们可以得知这个排名来自harbin。\\n4.__setitem__方法 #code 3-5 class games: def __init__(self): self.games={} def __setitem__(self,key,value): self.games[key]=value def __getitem__(self,key): return self.games[key] MyLoveGames = games() MyLoveGames[1] = \\u0026quot;原神\\u0026quot; print(MyLoveGames[1]) #输出：原神 这个魔法方法让类的实例可以像字典或者列表一样，添加新的键值对或者添加新的索引和值。\\n5.__delitem__方法 #code 3-6 class games: def __init__(self): self.games={} def __setitem__(self,key,value): self.games[key]=value def __getitem__(self,key): return self.games[key] def __delitem__(self,key): del self.games[key] MyLoveGames = games() MyLoveGames[1] = \\u0026quot;原神\\u0026quot; MyLoveGames[1] = \\u0026quot;DOTA2\\u0026quot; print(MyLoveGames[1]) del MyLoveGames[1] #输出：DOTA2 这个魔法方法可以让类的实例使用del关键字来删除键或索引。\\n6.__iter__方法 #code 3-7 class games: def __init__(self): self.games={} def __setitem__(self,key,value): self.games[key]=value def __getitem__(self,key): return self.games[key] def __delitem__(self,key): del self.games[key] def __iter__(self): for game in self.games: yield game MyLoveGame = games() MyLoveGame[0] = \\u0026quot;原神\\u0026quot; MyLoveGame[3] = \\u0026quot;DOTA2\\u0026quot; MyLoveGame[2] = \\u0026quot;明日方舟\\u0026quot; del MyLoveGame[2] for game in MyLoveGame: print(game) #输出：0 #输出：3 这个魔法方法让实例变为可迭代对象，可以进行for循环。也可以用iter()函数生成迭代器。这里涉及到一个头疼的yield关键字，又涉及到生成器和迭代器。还是另开一文来记录吧。\\n简单来讲，当一个可迭代对象遇到for循环事件时，会自动转到它的__iter__方法，又因为这里的__iter__方法含有yield关键字，所以不会立即执行，而是得到了一个生成器对象。\\n紧接着，for循环又根据这个生成器对象的__next__方法（注意，这里是生成器对象的__next__方法，而非是，我们这个自定义类的__next__方法，其实，我们这里也没有写__next__方法）把得到的值赋值给for game in MyLoveGame:中的game，然后打印。\\n在进行第二次循环的时候，同样地，再次进入实例的__iter__方法，得到同一个生成器对象。并对这个生成器对象再此施加__next__方法，并把得到的值赋值给for game in MyLoveGame:中的game，然后打印。\\n谁是for game in MyLoveGame:中的game值？ __iter__方法本质上定义了一个生成器对象，而非函数。for循环会不断调用这个生成器对象__next__方法并把得到的值传递给game。\\n7.__repr__方法 #code 3-8 import collections.abc class games(collections.abc.MutableMapping): def __init__(self): self.games={} def __len__(self): return 0 def __setitem__(self,key,value): self.games[key]=value def __getitem__(self,key): return self.games[key] def __delitem__(self,key): del self.games[key] def __iter__(self): for game in self.games: yield game def __repr__(self): return repr(dict(self)) MyLoveGame = games() MyLoveGame[0] = \\u0026quot;原神\\u0026quot; MyLoveGame[1] = \\u0026quot;DOTA2\\u0026quot; MyLoveGame[2] = \\u0026quot;明日方舟\\u0026quot; print(MyLoveGame) #输出：{0: '原神', 1: 'DOTA2', 2: '明日方舟'} 这里让自定义的games继承了一个抽象基类，这样return repr(dict(self))才不报错。\\n这个魔法方法让实例可以直接使用实例时，返回一个官方字符串。\\n继承与抽象基类 如何继承父类 #code 4-1 class student: def __init__(self,gender=1,age=18): self.gender = gender self.age = age class xiaoxiaobuaigugujiao(student): def interests(self,data): self.interests = data print(self.interests) me = xiaoxiaobuaigugujiao() print(me.gender) print(me.age) me.interests(\\u0026quot;games\\u0026quot;) 在定义子类的时候，在子类的名字后加上(父类名)即可。\\nsuper()函数 #code 4-2 class student: def __init__(self,gender=1,age=18): self.gender = gender self.age = age class xiaoxiaobuaigugujiao(student): #子类中，当覆盖父类中的同名方法后，与父类同名方法的默认参数也要重新写一篇，不会继承 def __init__(self,gender=1,age=18,height=170): #调用父类的构造方法 super().__init__(gender,age) #额外补充 self.height = height def interests(self,data): self.interests = data print(self.interests) me = xiaoxiaobuaigugujiao() print(me.gender) print(me.age) print(me.height) me.interests(\\u0026quot;games\\u0026quot;) super()函数通常出现在子类定义方法的时候，用于调用父类的构造方法，并可以加以补充，这里我们在子类初始化时，就调用了父类student的构造方法，并额外补充了height。\\n抽象基类 抽象基类只能被继承。它要求子类必须实现某些抽象方法。\\n"`,categories:'["代码"]',tags:[],series:'["python"]',date:'"2025-05-13"'}),searchIndex.push({title:'"径向分布函数（RDF）-OVITO"',permalink:'"/%E5%88%86%E5%AD%90%E5%8A%A8%E5%8A%9B%E5%AD%A6/rdf_ovito/"',content:`"径向分布函数（RDF）计算 by OVITO 前言 OVITO Python Reference — OVITO Python Reference 3.12.3 documentation 是一个开源且功能强大的分子动力学后处理软件包。\\n本文将介绍如何利用 OVITO python module 计算单个结构以及一段轨迹（多个结构）内的径向分布函数。\\n适用于无机非晶体，其他体系慎用。\\n软件：OVITO、matplotlib、numpy\\n注意：本文仅供学习交流，欢迎指出错误或分享补充。无能力提供任何指导，求教者切勿留言。\\nThe partial RDFs of a single crystal structure 代码展示 #这段代码用于计算 RDF by OVITO from ovito.io import import_file from ovito.modifiers import CoordinationAnalysisModifier import numpy as np #导入一个氧化锆（ZrO2）的cif文件，所有OVITO支持的输入文件格式都可以（确保这个.py文件的路径下有这样一个cif文件，也可以稍微修改指定结构路径） pipeline = import_file(\\u0026quot;ZrO.cif\\u0026quot;) #施加一个名叫 CoordinationAnalysisModifier 的修饰器，cutoff用于控制截断半径，number_of_bins用于控制网格细分度（大小100-1000内都可以试试） pipeline.modifiers.append(CoordinationAnalysisModifier(cutoff = 5.0, number_of_bins = 500,partial=True)) #进行计算 rdf_table = pipeline.compute().tables['coordination-rdf'] #得到用于画图的横纵坐标，默认第一列是x轴数据，其余列是y轴数据 total_rdf = rdf_table.xy() #记录total_rdf中y轴数据对应是什么类型的pair-wise #这个例子中，输出为： #g(r) for pair-wise type combination O-O: #g(r) for pair-wise type combination O-Zr: #g(r) for pair-wise type combination Zr-Zr: #说明total_rdf是一个四列的数据，第一列是x轴坐标（其实是bin），第二列就是不同pair-wise的RDF数据，依次为 O-O,O-Zr,Zr-Zr rdf_names = rdf_table.y.component_names for component, name in enumerate(rdf_names): print(\\u0026quot;g(r) for pair-wise type combination %s:\\u0026quot; % name) #将total_rdf保存为txt文件，用于后续画图 np.savetxt(\\u0026quot;total_rdf.txt\\u0026quot;, total_rdf) #这段代码用于绘图 import numpy as np import matplotlib.pyplot as plt rdf_table = np.loadtxt('total_rdf.txt') #g(r) for pair-wise type combination O-O: #g(r) for pair-wise type combination O-Zr: #g(r) for pair-wise type combination Zr-Zr: #这里取的是 total_rdf.txt 中的第一列（对应[:,0]）和第三列（对应[:,2]），所以绘制的是 Zr-O pair-wise的partial RDF plt.plot(rdf_table[:,0], rdf_table[:,2]) #matplotlib的常规设置，问问万能的小迪老师吧 title_font = {'fontsize': 24, 'fontfamily': 'Times New Roman'} xlabel_font = {'fontsize': 22, 'fontfamily': 'Times New Roman'} ylabel_font = {'fontsize': 22, 'fontfamily': 'Times New Roman'} plt.title(\\u0026quot;RDF Zr-O\\u0026quot;, fontdict=title_font,pad=8) plt.xlabel(xlabel='distance r',fontdict=xlabel_font,loc='center',labelpad=8) plt.ylabel(ylabel='g(r)',fontdict=ylabel_font,loc='center',labelpad=8) plt.tick_params(axis='both', which='major', labelsize=16, direction='in') ax = plt.subplot() #因为只有一个静态结构，pair-wise的某些峰很高，所以这里的y轴坐标上限设置大一些，为200，可灵活改变 #x轴设置为6，稍大于截断半径cutoff即可，因为本身也只在截断半径以内统计 ax.set_ylim(0,200) plt.xlim(0,6) fig = plt.gcf() fig.set_size_inches(1200/100, 800/100) plt.savefig('output.png', dpi=100) plt.show() 结果展示 The partial RDFs of trajectories 代码展示 #这段代码用于计算一定时间内（一段轨迹）的平均 RDFs from ovito.io import import_file from ovito.modifiers import CoordinationAnalysisModifier,TimeAveragingModifier import numpy as np #读入轨迹文件，这里是利用 VASP 进行 AIMD 后得到的 XDATCAR 文件 pipeline = import_file(\\u0026quot;XDATCAR\\u0026quot;) #打印轨迹中的结构数 print(\\u0026quot;Number of MD frames:\\u0026quot;, pipeline.num_frames) #添加修饰器，与单个晶体结构相比，多了 TimeAveragingModifier 修饰器 pipeline.modifiers.append(CoordinationAnalysisModifier(cutoff = 5.0, number_of_bins = 500,partial=True)) pipeline.modifiers.append(TimeAveragingModifier(operate_on='table:coordination-rdf')) #计算 RDFs 数据 total_rdf = pipeline.compute().tables['coordination-rdf[average]'].xy() #记录pair-wise类型 rdf_names = pipeline.compute().tables['coordination-rdf[average]'].y.component_names for name in rdf_names: print(\\u0026quot;g(r) for pair-wise type combination %s:\\u0026quot; % name) #输出数据，用于后续绘图，不再重复 np.savetxt('rdf.txt', total_rdf, delimiter='\\\\t') OVITO小知识 受限于Python基础和时间精力的限制，以下内容皆为我个人的有限理解，未能严格考究，仅供参考。\\n在 The partial RDFs of a single crystal structure 的计算代码中 pipeline = import_file(\\u0026quot;ZrO.cif\\u0026quot;) 这段代码将外来的 cif 文件转化为 ovito 的一个 Pipeline 类的实例。\\n然后我们添加了修饰器，代码省略。\\n再然后是调用 Pipeline 类的 compute() 方法，得到一个非常重要的 DataCollection 类的实例。\\n再访问这个 DataCollection 实例的 tables 属性就得到一个DataTable 类的实例（在DataCollection 类的定义中，用 @property 的 装饰器语法将 tables() 方法转化为了 tables 属性，所以与 compute() 方法相比，不需要 () 了）\\nDataTable 类用于储存绘制直方和2d图的数据，当我们添加 CoordinationAnalysisModifier 修饰器后，经过 compute() 方法后，相应的 partial RDFs 数据就会被储存在这里，可以通过名为 'coordination-rdf' 的 键(key) 来检索。\\n我觉得 DataTable 类的实例绝非一个简单的字典，但把它当作字典来理解会比较容易。\\nrdf_table = pipeline.compute().tables['coordination-rdf'] 即，rdf_table 仍然属于 DataTable 类。接着用 .y.component_names 来获取 多组y轴数据 的表头。这里太复杂了，我也没看太懂，不展开了。\\nrdf_names = rdf_table.y.component_names 在 The partial RDFs of trajectories 的计算代码中 原本 compute() 方法只能用于单个结构，对于 trajectories 需要指定是哪个结构。\\n但添加 TimeAveragingModifier 修饰器后，允许我们计算时间相关量的平均值。详见：https://docs.ovito.org/python/modules/ovito_modifiers.html#ovito.modifiers.TimeAveragingModifier\\nReferences ovito.modifiers — OVITO Python Reference 3.12.3 documentation "`,categories:'["分子动力学"]',tags:[],series:'["OVITO"]',date:'"2025-05-12"'}),debug("当前本站共有 "+searchIndex.length+" 篇文章"),console.log("搜索索引:",searchIndex);const options={includeScore:!0,threshold:.6,keys:[{name:"title",weight:.7},{name:"content",weight:.3},{name:"tags",weight:.5},{name:"categories",weight:.5},{name:"series",weight:.5}]},fu
